services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      DB_HOST: db
      DB_NAME: webgis_bansos
      DB_USER: root
      DB_PASS: rafaelDatabase123
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rafaelDatabase123
    volumes:
      - db_data_rafael:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -uroot -prafaelDatabase123 --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  db_data_rafael:
